services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:3000"
    volumes:
      - video-data:/app/output
    environment:
      - RUST_LOG=info

  frontend:
    image: nginx:alpine
    ports:
      - "8889:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  video-data:
